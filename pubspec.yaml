name: bierliste
description: "Bierlisten App."
publish_to: 'none'
version: 1.0.4

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  provider: ^6.1.1
  shared_preferences: ^2.5.3
  animated_list_plus: ^0.5.2
  intl: ^0.18.0
  google_sign_in: ^6.1.4
  flutter_dotenv: ^5.2.1
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.3
  app_links: ^6.4.1
  qr_flutter: ^4.1.0
  package_info_plus: ^8.3.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/bierliste_icon.png"

flutter_native_splash:
  color: "#2A2A2A"
  image: "assets/bierliste_logo_kreis_padding.png"
  android: true
  ios: true
  fullscreen: true
  
  android_12:
    color: "#2A2A2A"
    image: "assets/bierliste_logo_kreis_padding.png"
    icon_background_color: "#2A2A2A"
